<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Motrix Smart Downloader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <div class="card">
        <h1 class="title">Motrix Smart Downloader</h1>
        <div class="field">
          <label for="url">Download URL</label>
          <input
            id="url"
            type="text"
            placeholder="https://example.com/file.mp4"
          />
        </div>
        <div class="row">
          <div class="field small">
            <label for="filename">File name</label>
            <input id="filename" type="text" placeholder="file.mp4" />
          </div>
          <div class="field small">
            <label for="dir">Download dir</label>
            <div class="dir-row">
              <input
                id="dir"
                type="text"
                placeholder="D:/Movies/2025"
                list="dirSuggestions"
                autocomplete="off"
              />
              <datalist id="dirSuggestions"></datalist>
              <button
                id="browseBtn"
                class="browse-btn"
                title="Browse for folder"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="actions">
          <button id="sendBtn" class="primary">
            Send to Motrix <span id="spinner" class="spinner hidden"></span>
          </button>
        </div>
        <div id="status" class="status">Ready</div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
